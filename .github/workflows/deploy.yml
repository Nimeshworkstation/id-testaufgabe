name: Deploy to Server

on:
  workflow_run:
    workflows: ["Build Docker Image"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Pull latest images
            docker pull smnighim/id-testaufgabe-backend:latest
            docker pull smnighim/id-testaufgabe-frontend:latest

            # Restart backend
            docker stop backend || true
            docker rm backend || true
            docker run -d --name backend -p 8000:8000 \
              -e DEBUG=False \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}" \
              -e EMAIL_HOST_USER="${{ secrets.EMAIL_HOST_USER }}" \
              -e EMAIL_HOST_PASSWORD="${{ secrets.EMAIL_HOST_PASSWORD }}" \
              smnighim/id-testaufgabe-backend:latest

            # Restart frontend
            docker stop frontend || true
            docker rm frontend || true
            docker run -d --name frontend -p 3000:80 \
              smnighim/id-testaufgabe-frontend:latest
