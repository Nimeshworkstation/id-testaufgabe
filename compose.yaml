services:
  backend:
    image: smnighim/id-testaufgabe-backend:latest
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}

  frontend:
    image: smnighim/id-testaufgabe-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
